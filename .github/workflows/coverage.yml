name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  QT_VERSION: "6.11.0"

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            ninja-build lcov \
            libgl1-mesa-dev libvulkan-dev libxkbcommon-dev

      - uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py', '.conan/profile') }}
          restore-keys: conan-${{ runner.os }}-

      - run: pip install "conan>=2.0"

      - name: Create Conan profile
        run: |
          mkdir -p .conan
          GCC_VER=$(gcc --version | grep -oP '\d+' | head -1)
          printf '[settings]\narch=x86_64\nbuild_type=Debug\ncompiler=gcc\ncompiler.cppstd=23\ncompiler.libcxx=libstdc++11\ncompiler.version=%s\nos=Linux\n' "$GCC_VER" > .conan/profile


      - name: Conan install
        run: |
          rm -f CMakeUserPresets.json
          conan install . \
            --profile:host=.conan/profile \
            --profile:build=.conan/profile \
            --output-folder=build/coverage \
            --build=missing \
            -s build_type=Debug
          rm -f CMakeUserPresets.json

      - run: cmake --preset coverage
      - run: cmake --build --preset coverage --parallel
      - run: ctest --preset coverage --output-on-failure -j4
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Collect coverage
        run: |
          lcov --directory build/coverage \
               --capture \
               --output-file coverage.info \
               --exclude "*/tests/*" --exclude "*/build/*" \
               --exclude "/usr/*"   --exclude "*/Qt/*"

      - uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - run: genhtml coverage.info --output-directory coverage_html

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage_html/
