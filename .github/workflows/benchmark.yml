name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  QT_VERSION: "6.11.0"

jobs:
  bench:
    name: Benchmarks
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            ninja-build \
            libgl1-mesa-dev libvulkan-dev libxkbcommon-dev

      - uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py', '.conan/profile') }}
          restore-keys: conan-${{ runner.os }}-

      - run: pip install "conan>=2.0"

      - name: Create Conan profile
        run: |
          mkdir -p .conan
          printf '[settings]\narch=x86_64\nbuild_type=Release\ncompiler=gcc\ncompiler.cppstd=23\ncompiler.libcxx=libstdc++11\ncompiler.version=13\nos=Linux\n' > .conan/profile


      - name: Conan install
        run: |
          rm -f CMakeUserPresets.json
          conan install . \
            --profile:host=.conan/profile \
            --profile:build=.conan/profile \
            --output-folder=build/bench \
            --build=missing \
            -s build_type=Release
          rm -f CMakeUserPresets.json

      - run: cmake --preset bench
      - run: cmake --build --preset bench --parallel

      - name: Run benchmarks
        run: |
          ./build/bench/tests/bench/AlciaBenchmarks \
            --benchmark_format=json \
            --benchmark_out=benchmark_result.json

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_result.json

      - name: Comment benchmark results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('benchmark_result.json', 'utf8'));
            const rows = data.benchmarks.map(b =>
              `| ${b.name} | ${b.real_time.toFixed(1)} ${b.time_unit} | ${b.cpu_time.toFixed(1)} ${b.time_unit} |`
            ).join('\n');
            const body = [
              '## Benchmark results',
              '| Benchmark | Real time | CPU time |',
              '|---|---|---|',
              rows,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
