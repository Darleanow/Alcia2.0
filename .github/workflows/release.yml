name: Release

on:
  push:
    tags:
      - "v*"

env:
  QT_VERSION: "6.11.0"

jobs:
  package:
    name: Package
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            ninja-build \
            libgl1-mesa-dev libglu1-mesa-dev libvulkan-dev \
            libxkbcommon-dev libfontconfig1-dev libfreetype-dev

      - uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host:    linux
          target:  desktop
          arch:    gcc_64
          cache:   true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py', '.conan/profile') }}
          restore-keys: conan-${{ runner.os }}-

      - run: pip install "conan>=2.0"

      - name: Create Conan profile
        run: |
          mkdir -p .conan
          GCC_VER=$(gcc --version | grep -oP '\d+' | head -1)
          printf '[settings]\narch=x86_64\nbuild_type=Release\ncompiler=gcc\ncompiler.cppstd=23\ncompiler.libcxx=libstdc++11\ncompiler.version=%s\nos=Linux\n' "$GCC_VER" > .conan/profile


      - name: Conan install
        run: |
          rm -f CMakeUserPresets.json
          conan install . \
            --profile:host=.conan/profile \
            --profile:build=.conan/profile \
            --output-folder=build/package \
            --build=missing \
            -s build_type=Release
          rm -f CMakeUserPresets.json

      - run: cmake --preset package
      - run: cmake --build --preset package --parallel

      - name: CPack
        working-directory: build/package
        run: cpack -G "TGZ;DEB"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/package/*.tar.gz
            build/package/*.deb
          generate_release_notes: true
