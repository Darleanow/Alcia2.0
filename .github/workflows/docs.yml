name: Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  QT_VERSION: "6.11.0"

jobs:
  build-docs:
    name: Build Doxygen Docs
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            ninja-build doxygen graphviz \
            libgl1-mesa-dev libvulkan-dev libxkbcommon-dev

      - uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py', '.conan/profile') }}
          restore-keys: conan-${{ runner.os }}-

      - run: pip install "conan>=2.0"

      - name: Create Conan profile
        run: |
          mkdir -p .conan
          GCC_VER=$(gcc --version | grep -oP '\d+' | head -1)
          printf '[settings]\narch=x86_64\nbuild_type=Release\ncompiler=gcc\ncompiler.cppstd=23\ncompiler.libcxx=libstdc++11\ncompiler.version=%s\nos=Linux\n' "$GCC_VER" > .conan/profile


      - name: Conan install
        run: |
          rm -f CMakeUserPresets.json
          conan install . \
            --profile:host=.conan/profile \
            --profile:build=.conan/profile \
            --output-folder=build/docs \
            --build=missing \
            -s build_type=Release \
            -o with_tests=False
          rm -f CMakeUserPresets.json

      - run: cmake --preset docs
      - run: cmake --build --preset docs --target docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/html

  deploy:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id:   deployment
        uses: actions/deploy-pages@v4
