name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  QT_VERSION: "6.11.0"

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            ninja-build ccache clang-tidy clang-format \
            libgl1-mesa-dev libglu1-mesa-dev libvulkan-dev \
            libxkbcommon-dev libfontconfig1-dev libfreetype-dev

      - uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py', '.conan/profile') }}
          restore-keys: conan-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-ci-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-ci-

      - run: pip install "conan>=2.0"

      - name: Create Conan profile
        run: |
          mkdir -p .conan
          GCC_VER=$(gcc --version | grep -oP '\d+' | head -1)
          printf '[settings]\narch=x86_64\nbuild_type=Release\ncompiler=gcc\ncompiler.cppstd=23\ncompiler.libcxx=libstdc++11\ncompiler.version=%s\nos=Linux\n' "$GCC_VER" > .conan/profile

      - name: Conan install
        run: |
          rm -f CMakeUserPresets.json
          conan install . \
            --profile:host=.conan/profile \
            --profile:build=.conan/profile \
            --output-folder=build/ci \
            --build=missing \
            -s build_type=Release
          rm -f CMakeUserPresets.json

      - run: cmake --preset ci
      - run: cmake --build --preset ci --parallel
      - run: ctest --preset ci --output-on-failure -j4
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/**/Testing/**/*.xml

  format-check:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - run: sudo apt-get install -y clang-format
      - run: |
          find src include tests -name "*.cpp" -o -name "*.hpp" | \
            xargs clang-format --dry-run --Werror

  sanitizers:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ASan+UBSan
            preset: asan
          - name: TSan
            preset: tsan
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            ninja-build ccache \
            libgl1-mesa-dev libvulkan-dev libxkbcommon-dev

      - uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py', '.conan/profile') }}
          restore-keys: conan-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ matrix.preset }}-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-${{ matrix.preset }}-

      - run: pip install "conan>=2.0"

      - name: Create Conan profile
        run: |
          mkdir -p .conan
          GCC_VER=$(gcc --version | grep -oP '\d+' | head -1)
          printf '[settings]\narch=x86_64\nbuild_type=Debug\ncompiler=gcc\ncompiler.cppstd=23\ncompiler.libcxx=libstdc++11\ncompiler.version=%s\nos=Linux\n' "$GCC_VER" > .conan/profile

      - name: Conan install
        run: |
          rm -f CMakeUserPresets.json
          conan install . \
            --profile:host=.conan/profile \
            --profile:build=.conan/profile \
            --output-folder=build/${{ matrix.preset }} \
            --build=missing \
            -s build_type=Debug
          rm -f CMakeUserPresets.json

      - run: cmake --preset ${{ matrix.preset }}
      - run: cmake --build --preset ${{ matrix.preset }} --parallel
      - run: ctest --preset ${{ matrix.preset }} --output-on-failure -j4
        env:
          QT_QPA_PLATFORM: offscreen
