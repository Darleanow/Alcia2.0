name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  QT_VERSION: "6.11.0"

jobs:
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            ninja-build clang-tidy \
            libgl1-mesa-dev libvulkan-dev libxkbcommon-dev

      - uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py', '.conan/profile') }}
          restore-keys: conan-${{ runner.os }}-

      - run: pip install "conan>=2.0"

      - name: Conan install
        run: |
          rm -f CMakeUserPresets.json
          conan install . \
            --profile:host=.conan/profile \
            --profile:build=.conan/profile \
            --output-folder=build/tidy \
            --build=missing \
            -s build_type=Debug
          rm -f CMakeUserPresets.json

      - run: cmake --preset tidy

      - name: Build with clang-tidy
        run: cmake --build --preset tidy 2>&1 | tee clang-tidy-output.txt

      - name: Upload clang-tidy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: clang-tidy-output.txt

  sarif-upload:
    name: clang-tidy SARIF
    runs-on: ubuntu-24.04
    needs: clang-tidy
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          name: clang-tidy-report
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: clang-tidy-output.txt
          category: clang-tidy
        continue-on-error: true
