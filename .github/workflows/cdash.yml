name: CDash

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"

env:
  QT_VERSION: "6.11.0"

jobs:
  nightly:
    name: CDash Nightly
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            ninja-build lcov \
            libgl1-mesa-dev libvulkan-dev libxkbcommon-dev

      - uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py', '.conan/profile') }}
          restore-keys: conan-${{ runner.os }}-

      - run: pip install "conan>=2.0"

      - name: Create Conan profile
        run: |
          mkdir -p .conan
          printf '[settings]\narch=x86_64\nbuild_type=Release\ncompiler=gcc\ncompiler.cppstd=23\ncompiler.libcxx=libstdc++11\ncompiler.version=13\nos=Linux\n' > .conan/profile


      - name: Conan install
        run: |
          rm -f CMakeUserPresets.json
          conan install . \
            --profile:host=.conan/profile \
            --profile:build=.conan/profile \
            --output-folder=build/coverage \
            --build=missing \
            -s build_type=Debug
          rm -f CMakeUserPresets.json

      - run: cmake --preset coverage

      - name: CTest Dashboard submission
        env:
          CTEST_SITE:          "github-actions"
          CTEST_BUILD_NAME:    "Linux-GCC-${{ github.sha }}"
          CTEST_DROP_SITE:     ${{ secrets.CDASH_HOST }}
          CTEST_DROP_LOCATION: ${{ secrets.CDASH_PROJECT_PATH }}
        run: |
          ctest --preset coverage \
            -D ExperimentalStart \
            -D ExperimentalConfigure \
            -D ExperimentalBuild \
            -D ExperimentalTest \
            -D ExperimentalCoverage \
            -D ExperimentalSubmit \
            --output-on-failure
