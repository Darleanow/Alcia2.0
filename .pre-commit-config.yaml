repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        types_or: [c, c++]
        args: ["--style=file"]

  - repo: local
    hooks:
      - id: clang-tidy
        name: clang-tidy
        language: system
        entry: bash -c 'cmake --preset tidy --log-level=ERROR 2>/dev/null; cmake --build --preset tidy 2>&1 | grep -E "warning:|error:" || true'
        types_or: [c, c++]
        pass_filenames: false
        stages: [pre-push]

  - repo: local
    hooks:
      - id: license-headers
        name: license-headers
        language: python
        entry: python3 scripts/add_license_header.py --check src include tests
        pass_filenames: false
        always_run: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      - id: cmake-format

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args: ["--toml=.codespell.toml"]
        additional_dependencies: [tomli]

  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
        stages: [commit-msg]
