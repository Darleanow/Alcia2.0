name: _setup

on:
  workflow_call:
    inputs:
      qt-version:
        type: string
        default: "6.11.0"
      build-type:
        type: string
        default: "Release"
      preset:
        type: string
        required: true
      extra-apt:
        type: string
        default: ""

jobs:
  setup:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            ninja-build ccache \
            libgl1-mesa-dev libglu1-mesa-dev libvulkan-dev \
            libxkbcommon-dev libfontconfig1-dev libfreetype-dev \
            ${{ inputs.extra-apt }}

      - uses: jurplel/install-qt-action@v4
        with:
          version: ${{ inputs.qt-version }}
          host:    linux
          target:  desktop
          arch:    gcc_64
          cache:   true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py', '.conan/profile') }}
          restore-keys: conan-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ inputs.preset }}-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-${{ inputs.preset }}-

      - run: pip install "conan>=2.0"

      - name: Conan install
        run: |
          rm -f CMakeUserPresets.json
          conan install . \
            --profile:host=.conan/profile \
            --profile:build=.conan/profile \
            --output-folder=build/${{ inputs.preset }} \
            --build=missing \
            -s build_type=${{ inputs.build-type }}
          rm -f CMakeUserPresets.json
